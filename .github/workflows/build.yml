name: Build desktop apps

# Build installers on native runners (the reliable way to get correct native
# modules — better-sqlite3 / keytar — for each OS). Triggered manually or by a
# version tag like v0.1.0.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs deps and rebuilds native modules for THIS runner's OS/arch
      # via the postinstall (electron-builder install-app-deps).
      - run: npm ci

      - run: npm run build

      - name: Package installers
        run: npx electron-builder --publish never
        env:
          # Unsigned by default. Do NOT pass empty CSC_* vars — an empty CSC_LINK
          # is treated as a cert path and fails ("not a file").
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- To sign: add the repo secrets (see SIGNING.md) and uncomment.
          # Keep CSC_IDENTITY_AUTO_DISCOVERY:'false' above — with CSC_LINK set,
          # electron-builder signs from that cert without a keychain search.
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interviewlens-${{ matrix.name }}
          path: |
            dist-app/*.dmg
            dist-app/*.zip
            dist-app/*.exe
            dist-app/*.blockmap
          if-no-files-found: ignore
